version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: israinsols_db
    environment:
      POSTGRES_DB: israinsols_db
      POSTGRES_USER: israinsols
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: israinsols_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
